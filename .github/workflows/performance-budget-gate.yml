name: performance-budget-gate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  performance-budget-gate:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run performance budget gate
        run: npm run test:performance:gate

      - name: Upload performance gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-budget-gate
          path: artifacts/performance/performance-budget-gate.json
          if-no-files-found: error