name: release-readiness

on:
  workflow_dispatch:
  push:
  pull_request:

jobs:
  release-readiness:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release lane
        run: npm run release:verify

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsc-powersyntax-vsix
          path: ./.dist/vsc-powersyntax.vsix

      - name: Upload performance gate artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-budget-gate
          path: ./artifacts/performance/performance-budget-gate.json