name: Release Readiness

on:
  workflow_dispatch:
    inputs:
      runSynthetic10k:
        description: Run optional synthetic 10K performance gate
        required: false
        default: 'false'
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 3 * * 1'

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release verification
        run: xvfb-run -a npm run release:verify

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsc-powersyntax-vsix
          path: ./.dist/vsc-powersyntax.vsix
          retention-days: 14

  synthetic-10k:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.runSynthetic10k == 'true')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run optional synthetic 10K gate
        env:
          PB_10K_GATE_MODE: report-only
        run: xvfb-run -a npm run test:performance:10k:nightly

      - name: Upload synthetic 10K report
        uses: actions/upload-artifact@v4
        with:
          name: vsc-powersyntax-synthetic-10k-report
          path: ./artifacts/performance/performance-10k-gate.json
          retention-days: 14