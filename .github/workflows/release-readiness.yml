name: Release Readiness

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  release-readiness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run release verification
        run: xvfb-run -a npm run release:verify

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: vsc-powersyntax-vsix
          path: ./.dist/vsc-powersyntax.vsix
          retention-days: 14