name: release-readiness

on:
  workflow_dispatch:
  push:
  pull_request:

env:
  # Opt-in para validar ya el runtime Node 24 de las GitHub Actions JavaScript.
  # No cambia el Node.js del proyecto, que sigue siendo 22 en setup-node.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  release-readiness:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release lane
        run: npm run release:verify

      - name: Verify VSIX artifact exists
        shell: pwsh
        run: |
          if (!(Test-Path ".\.dist\vsc-powersyntax.vsix")) {
            Write-Error "Missing VSIX artifact: .\.dist\vsc-powersyntax.vsix"
            exit 1
          }

      - name: List performance artifacts
        if: always()
        shell: pwsh
        run: |
          if (Test-Path ".\artifacts\performance") {
            Get-ChildItem ".\artifacts\performance" -Recurse | Format-Table FullName, Length
          } else {
            Write-Host "No artifacts/performance directory found."
          }

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsc-powersyntax-vsix
          path: ./.dist/vsc-powersyntax.vsix
          if-no-files-found: error

      - name: Upload performance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-artifacts
          path: ./artifacts/performance/*.json
          if-no-files-found: warn
